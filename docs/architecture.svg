<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="620">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#888" />
        </marker>
        <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.1"/>
        </filter>
        <style>
            .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
            .title { font-weight: 600; font-size: 15px; fill: #1d1d1f; }
            .subtitle { font-weight: 400; font-size: 12px; fill: #515154; }
            .card { fill: #ffffff; stroke: #e1e4e8; stroke-width: 1px; rx: 8px; filter: url(#drop-shadow); }
            .line { stroke: #888; stroke-width: 2px; }
            .label { font-size: 11px; font-weight: 500; fill: #586069; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#f6f8fa" rx="12"/>

    <!-- ── Row 1: Developer ── -->
    <g transform="translate(250, 30)">
        <rect width="300" height="60" class="card"/>
        <text x="150" y="28" class="text title" text-anchor="middle">Developer</text>
        <text x="150" y="46" class="text subtitle" text-anchor="middle">Pushes to GitHub (main branch)</text>
    </g>

    <!-- Arrow down -->
    <path d="M400,90 L400,125" class="line" marker-end="url(#arrow)"/>

    <!-- ── Row 2: GitHub Actions ── -->
    <g transform="translate(200, 135)">
        <rect width="400" height="115" class="card"/>
        <path d="M25,23 l-4,4 l-4,-4 M25,37 l4,-4 l4,4 M17,30 h16 M25,22 v16" stroke="#24292e" stroke-width="2" fill="none" transform="translate(5, 5)"/>
        <text x="55" y="35" class="text title">GitHub Actions (CI/CD pipeline)</text>

        <g class="text subtitle" transform="translate(60, 58)">
            <circle cx="0" cy="-4" r="4" fill="#0366d6"/>
            <text x="15" y="0">Runs tests</text>
            <circle cx="0" cy="20" r="4" fill="#0366d6"/>
            <text x="15" y="24">Builds and pushes Docker image</text>
            <circle cx="0" cy="44" r="4" fill="#28a745"/>
            <text x="15" y="48">Deploys new revision to Cloud Run</text>
            <path d="M0,0 L0,44" stroke="#e1e4e8" stroke-width="2" fill="none"/>
        </g>
    </g>

    <!-- Arrow down -->
    <path d="M400,250 L400,275" class="line" marker-end="url(#arrow)"/>

    <!-- ── Row 3: Artifact Registry ── -->
    <g transform="translate(300, 285)">
        <rect width="200" height="55" class="card"/>
        <text x="100" y="25" class="text title" text-anchor="middle">Artifact Registry</text>
        <text x="100" y="42" class="text subtitle" text-anchor="middle">Stores Docker images privately</text>
    </g>

    <!-- Arrow down -->
    <path d="M400,340 L400,365" class="line" marker-end="url(#arrow)"/>

    <!-- ── Row 4: GCP Services ── -->

    <!-- Cloud Run (center) -->
    <g transform="translate(280, 375)">
        <rect width="240" height="190" class="card" stroke="#0366d6" stroke-width="2"/>
        <text x="120" y="38" class="text title" text-anchor="middle" fill="#0366d6">Cloud Run</text>
        <text x="120" y="56" class="text subtitle" text-anchor="middle">Django app · Handles HTTPS</text>

        <!-- Django App -->
        <g transform="translate(45, 90)">
            <rect width="150" height="60" fill="#f1f8ff" stroke="#0366d6" rx="6" stroke-width="1"/>
            <text x="75" y="25" class="text title" text-anchor="middle" font-size="13px" fill="#0366d6">Django App</text>
            <text x="75" y="43" class="text subtitle" text-anchor="middle" font-size="11px">Web server + tasks</text>
        </g>
    </g>

    <!-- Cloud SQL (left, arrow into Cloud Run) -->
    <g transform="translate(70, 400)">
        <rect width="140" height="65" class="card"/>
        <text x="70" y="26" class="text title" text-anchor="middle" font-size="14px">Cloud SQL</text>
        <text x="70" y="44" class="text subtitle" text-anchor="middle" font-size="12px">PostgreSQL database</text>
    </g>
    <path d="M210,435 L280,435" class="line" marker-end="url(#arrow)"/>

    <!-- Cloud Storage (right, arrow into Cloud Run) -->
    <g transform="translate(590, 400)">
        <rect width="140" height="65" class="card"/>
        <text x="70" y="26" class="text title" text-anchor="middle" font-size="14px">Cloud Storage</text>
        <text x="70" y="44" class="text subtitle" text-anchor="middle" font-size="12px">Static &amp; media files</text>
    </g>
    <path d="M590,435 L520,435" class="line" marker-end="url(#arrow)"/>   

    <!-- Secret Manager (bottom-left, arrow up to Cloud Run) -->
    <g transform="translate(70, 490)">
        <rect width="140" height="65" class="card"/>
        <text x="70" y="26" class="text title" text-anchor="middle" font-size="14px">Secret Manager</text>
        <text x="70" y="44" class="text subtitle" text-anchor="middle" font-size="12px">Credentials &amp; keys</text>
    </g>
    <path d="M210,525 L280,525" class="line" marker-end="url(#arrow)"/>

    <!-- Cloud Tasks (bottom-right) -->
    <g transform="translate(590, 490)">
        <rect width="140" height="65" class="card"/>
        <text x="70" y="26" class="text title" text-anchor="middle" font-size="14px">Cloud Tasks</text>
        <text x="70" y="44" class="text subtitle" text-anchor="middle" font-size="12px">Task queue (HTTP)</text>
    </g>

    <!-- Arrow: Cloud Run → Cloud Tasks (enqueue) -->
    <path d="M520,510 L590,510" class="line" marker-end="url(#arrow)"/>
    <text x="555" y="500" class="text label" text-anchor="middle">Enqueues task</text>

    <!-- Arrow: Cloud Tasks → Cloud Run (deliver) -->
    <path d="M590,540 L520,540" class="line" marker-end="url(#arrow)"/>
    <text x="555" y="530" class="text label" text-anchor="middle">Delivers task</text>

</svg>