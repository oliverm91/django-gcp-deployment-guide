<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" height="650">
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#888" />
        </marker>
        <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
        </filter>
        <style>
            .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
            .title { font-weight: 600; font-size: 16px; fill: #1d1d1f; }
            .subtitle { font-weight: 400; font-size: 14px; fill: #515154; }
            .card { fill: #ffffff; stroke: #e1e4e8; stroke-width: 1px; rx: 8px; filter: url(#drop-shadow); }
            .line { stroke: #888; stroke-width: 2px; }
            .label { font-size: 13px; font-weight: 500; fill: #586069; }
        </style>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="#f6f8fa" rx="12"/>

    <!-- Developer -->
    <g transform="translate(250, 40)">
        <rect width="300" height="60" class="card"/>
        <text x="150" y="30" class="text title" text-anchor="middle">Developer</text>
        <text x="150" y="48" class="text subtitle" text-anchor="middle">Pushes to GitHub (main branch)</text>
    </g>

    <!-- Arrow down -->
    <path d="M400,100 L400,140" class="line" marker-end="url(#arrow)"/>
    
    <!-- GitHub Actions -->
    <g transform="translate(200, 150)">
        <rect width="400" height="190" class="card"/>
        <path d="M25,23 l-4,4 l-4,-4 M25,37 l4,-4 l4,4 M17,30 h16 M25,22 v16" stroke="#24292e" stroke-width="2" fill="none" transform="translate(5, 5)"/>
        <text x="55" y="35" class="text title">GitHub Actions (CI/CD pipeline)</text>
        
        <g class="text subtitle" transform="translate(60, 65)">
            <circle cx="0" cy="-4" r="4" fill="#0366d6"/>
            <text x="15" y="0">Runs tests</text>
            
            <circle cx="0" cy="26" r="4" fill="#0366d6"/>
            <text x="15" y="30">Builds Docker image</text>
            
            <circle cx="0" cy="56" r="4" fill="#0366d6"/>
            <text x="15" y="60">Pushes image to Artifact Registry</text>
            
            <circle cx="0" cy="86" r="4" fill="#0366d6"/>
            <text x="15" y="90">Runs database migrations</text>

            <circle cx="0" cy="116" r="4" fill="#28a745"/>
            <text x="15" y="120">Deploys new revision to Cloud Run</text>

            <!-- vertical connection line -->
            <path d="M0,0 L0,116" stroke="#e1e4e8" stroke-width="2" fill="none"/>
        </g>
    </g>

    <!-- Arrow down -->
    <path d="M400,340 L400,380" class="line" marker-end="url(#arrow)"/>
    
    <!-- GCP Core Services -->
    <g transform="translate(150, 390)">
        <rect width="500" height="220" class="card"/>
        <text x="250" y="40" class="text title" text-anchor="middle">Cloud Run (Google Cloud)</text>
        <text x="250" y="60" class="text subtitle" text-anchor="middle">Serves web traffic, HTTPS, auto-scales</text>
        
        <!-- Nested Services -->
        <!-- Cloud SQL -->
        <g transform="translate(30, 90)">
            <rect width="130" height="100" fill="#f8f9fa" stroke="#dadce0" rx="6" stroke-width="1"/>
            <text x="65" y="45" class="text title" text-anchor="middle" font-size="14px">Cloud SQL</text>
            <text x="65" y="65" class="text subtitle" text-anchor="middle" font-size="12px">PostgreSQL database</text>
        </g>
        
        <!-- Cloud Storage -->
        <g transform="translate(185, 90)">
            <rect width="130" height="100" fill="#f8f9fa" stroke="#dadce0" rx="6" stroke-width="1"/>
            <text x="65" y="45" class="text title" text-anchor="middle" font-size="14px">Cloud Storage</text>
            <text x="65" y="65" class="text subtitle" text-anchor="middle" font-size="12px">Images + files</text>
        </g>

        <!-- Secret Manager -->
        <g transform="translate(340, 90)">
            <rect width="130" height="100" fill="#f8f9fa" stroke="#dadce0" rx="6" stroke-width="1"/>
            <text x="65" y="45" class="text title" text-anchor="middle" font-size="14px">Secret Manager</text>
            <text x="65" y="65" class="text subtitle" text-anchor="middle" font-size="12px">Credentials &amp; keys</text>
        </g>
        
        <!-- Lines connecting services to Cloud Run -->
        <path d="M250,70 L250,85" stroke="#dadce0" stroke-width="2" marker-end="url(#arrow)"/>
        <path d="M250,75 L95,75 L95,85" stroke="#dadce0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
        <path d="M250,75 L405,75 L405,85" stroke="#dadce0" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    </g>

</svg>
