<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#94a3b8" />
        </marker>
        <marker id="arrow-both" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
            <path d="M8,0 L8,8 L0,4 z" fill="#94a3b8" />
        </marker>
        <style>
            .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
            .box { fill: #1e293b; stroke: #475569; stroke-width: 2px; rx: 8px; }
            .box-main { fill: #1e293b; stroke: #38bdf8; stroke-width: 3px; rx: 12px; }
            .title { font-weight: 700; font-size: 16px; fill: #f8fafc; text-anchor: middle; }
            .subtitle { font-weight: 400; font-size: 12px; fill: #94a3b8; text-anchor: middle; }
            .label { font-weight: 500; font-size: 13px; fill: #cbd5e1; }
            .line { stroke: #94a3b8; stroke-width: 2px; fill: none; }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#0f172a" rx="12"/>

    <!-- Center: Cloud Run -->
    <g transform="translate(300, 150)">
        <rect width="200" height="150" class="box-main"/>
        <text x="100" y="50" class="text title" fill="#38bdf8">Cloud Run</text>
        <text x="100" y="75" class="text subtitle">Django Application</text>
        <text x="100" y="105" class="text subtitle" font-size="11px">Auto-scaling Docker Container</text>
        <text x="100" y="125" class="text subtitle" font-size="11px">Executes as Service Account</text>
    </g>

    <!-- Top Left: Internet -->
    <g transform="translate(40, 185)">
        <rect width="120" height="80" class="box" fill="#334155" stroke="none"/>
        <text x="60" y="35" class="text title">Internet</text>
        <text x="60" y="55" class="text subtitle">HTTPS Traffic</text>
    </g>

    <!-- Bottom Left: Secret Manager -->
    <g transform="translate(180, 340)">
        <rect width="160" height="70" class="box"/>
        <text x="80" y="30" class="text title">Secret Manager</text>
        <text x="80" y="50" class="text subtitle">Injects Passwords &amp; Keys</text>
    </g>

    <!-- Top Right: Cloud Storage -->
    <g transform="translate(560, 60)">
        <rect width="160" height="70" class="box"/>
        <text x="80" y="30" class="text title">Cloud Storage</text>
        <text x="80" y="50" class="text subtitle">Serves Static &amp; Media Files</text>
    </g>

    <!-- Bottom Right: Cloud SQL -->
    <g transform="translate(560, 340)">
        <rect width="160" height="70" class="box"/>
        <text x="80" y="30" class="text title">Cloud SQL</text>
        <text x="80" y="50" class="text subtitle">PostgreSQL Database</text>
    </g>

    <!-- Arrows -->
    <!-- Internet -> Cloud Run -->
    <path d="M 160,225 L 290,225" class="line" marker-end="url(#arrow)"/>
    <text x="225" y="215" class="text label" text-anchor="middle">Requests</text>

    <!-- Cloud Run -> Storage -->
    <path d="M 500,190 L 530,190 L 530,95 L 550,95" class="line" marker-start="url(#arrow-both)" />
    <text x="640" y="150" class="text label" text-anchor="middle">Asset Retrieval</text>

    <!-- Cloud Run -> Cloud SQL -->
    <path d="M 500,260 L 530,260 L 530,375 L 550,375" class="line" marker-start="url(#arrow-both)" />
    <text x="640" y="325" class="text label" text-anchor="middle">Auth Proxy Connection</text>

    <!-- Secret Manager -> Cloud Run (At Startup) -->
    <path d="M 260,340 L 260,260 L 290,260" class="line" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
    <text x="150" y="280" class="text label">Reads exactly at startup</text>

</svg>
