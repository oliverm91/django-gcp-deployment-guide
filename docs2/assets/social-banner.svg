<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <!-- Arrow Def -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
        </marker>
        
        <style>
            .font-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 80px; fill: #ffffff; }
            .font-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 36px; fill: #94a3b8; }
            .font-gcp { fill: #38bdf8; }
            .stroke-blue { stroke: #38bdf8; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
            .fill-cloud { fill: #38bdf8; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)" />

    <!-- Text Group -->
    <g transform="translate(100, 200)">
        <text class="font-title">
            <tspan x="0" y="0">GCP Deployment</tspan>
            <tspan class="font-gcp"> Guide</tspan>
        </text>
        <text class="font-subtitle">
            <tspan x="0" y="60">Deploy your Django with GCP</tspan>
            <tspan x="0" y="120">Automated with GitHub Actions.</tspan>
        </text>
    </g>

    <!-- Graphics Group (Right Side) -->
    
    <!-- Computer Graphic -->
    <g transform="translate(650, 360)">
        <!-- Screen -->
        <rect x="0" y="20" width="200" height="130" rx="12" fill="#1e293b" stroke="#475569" stroke-width="8" />
        <!-- Screen Content/Code Lines -->
        <line x1="25" y1="45" x2="100" y2="45" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
        <line x1="25" y1="70" x2="150" y2="70" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
        <line x1="25" y1="95" x2="75" y2="95" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
        <line x1="25" y1="120" x2="130" y2="120" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
        <!-- Laptop Base -->
        <path d="M -20,154 L 220,154 L 240,174 L -40,174 Z" fill="#334155" />
    </g>

    <!-- Curved Flow Arrow -->
    <path d="M 855,450 Q 1040,450 1030,350" 
      fill="none" 
      stroke="#38bdf8" 
      stroke-width="6" 
      stroke-linecap="round"/>
      


    <!-- Cloud Graphic -->
    <g transform="translate(930, 140) scale(1.6)">
        <g transform="translate(-60, 0) scale(3.5)">
            <path d="M 22 38 L 44 38 A 7 7 0 0 0 44 24 A 10 10 0 0 0 26 26 A 6 6 0 0 0 22 38 Z" class="fill-cloud" />
        </g>
    </g>
</svg>
