site_name: GCP Deployment Guide
site_description: Master production-ready Django deployments on Google Cloud Platform with this step-by-step CI/CD guide. Start scaling your app today!
site_url: https://oliverm91.github.io/django-gcp-deployment-guide/
site_author: "Oliver Mohr Bonometti"
repo_name: oliverm91/django-gcp-deployment-guide
repo_url: https://github.com/oliverm91/django-gcp-deployment-guide

theme:
  name: material
  custom_dir: overrides
  favicon: assets/logo.svg
  logo: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - "Overview": index.md
  - "Step 1: GCP Setup": 01_gcp_setup.md
  - "Step 2: Artifact Registry": 02_artifact_registry.md
  - "Step 3: Cloud SQL (DB)": 03_cloud_sql.md
  - "Step 4: Secret Manager": 04_secret_manager.md
  - "Step 5: Cloud Storage": 05_cloud_storage.md
  - "Step 6: Dockerfile": 06_dockerfile.md
  - "Step 7: First Deploy": 07_first_deploy.md
  - "Step 8: Domain & SSL": 08_domain_ssl.md
  - "Step 9: Keyless Auth": 09_workload_identity.md
  - "Step 10: CI/CD Pipeline": 10_github_actions.md
  - "Step 11: Quick Reference": 11_quick_reference.md
  - "Step 12: Custom Email": 12_custom_email.md
  - "Bonus: Django Tasks": 13_django_tasks.md

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
  - search


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
