site_name: Terraform Deployment Guide
site_description: Master production-ready Django deployments on Google Cloud Platform with this step-by-step CI/CD guide. Start scaling your app today!
site_url: https://oliverm91.github.io/django-terraform-deployment-guide/
site_author: "Oliver Mohr Bonometti"
repo_name: oliverm91/django-terraform-deployment-guide
repo_url: https://github.com/oliverm91/django-terraform-deployment-guide

theme:
  name: material
  custom_dir: overrides
  favicon: assets/logo.svg
  logo: assets/logo.svg
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - "Overview": index.md
  - "01 — Introduction": 01_introduction.md
  - "02 — Terraform Overview": 02_terraform_overview.md
  - "03 — Cloud Services Explained": 03_cloud_services.md
  - "04 — Database Setup": 04_planetscale.md
  - "05 — Project Setup & Terraform State": 05_project_setup.md
  - "06 — GCP Project & APIs": 06_gcp_project.md
  - "07 — Artifact Registry": 07_artifact_registry.md
  - "08 — Secrets Management": 09_secrets.md
  - "09 — Cloud Storage": 10_storage.md
  - "10 — Service Accounts & IAM": 11_iam.md
  - "11 — Cloud Run": 12_cloud_run.md
  - "12 — Cloud Tasks & Scheduler": 13_tasks.md
  - "13 — Dockerfile": 14_dockerfile.md
  - "14 — First Deploy": 15_first_deploy.md
  - "15 — Custom Domain & SSL": 16_domain_ssl.md
  - "16 — Workload Identity Federation": 17_wif.md
  - "17 — GitHub Actions CI/CD": 18_github_actions.md
  - "18 — Quick Reference": 19_quick_reference.md

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
  - search


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
